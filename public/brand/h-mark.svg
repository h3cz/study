<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!--
    h-mark.svg  —  hecz / study brand mark
    A serif lowercase "h", split vertically at x=104 (mid-stem).
    Left half: #1A1816  |  Right half: #F5A623
    Amber ✓ tick in upper-right negative space.
    Background: transparent.
  -->
  <defs>
    <!-- Split at x=104 (right edge of stem) -->
    <clipPath id="cp-left">
      <rect x="0" y="0" width="104" height="256"/>
    </clipPath>
    <clipPath id="cp-right">
      <rect x="104" y="0" width="152" height="256"/>
    </clipPath>
  </defs>

  <!--
    The serif "h" glyph — drawn once, clipped twice.

    Anatomy (all coords in 256×256 canvas):
      Stem:       left=44, right=104, top=24, bottom=228
      Arch:       rises from stem at y=92, peaks at y=78,
                  lands on right-leg top at y=108
      Right leg:  left=154, right=214, top=108, bottom=228
      Serif feet (bottom bracketed serifs):
        Stem left foot:  x 32–60  y 224–234  (small horizontal flange)
        Stem right foot: x 90–118 y 224–234
        Rleg left foot:  x 142–170 y 224–234
        Rleg right foot: x 200–228 y 224–234
      Cap serif (top of stem):
        x 32–60  y 24–34   (left ear)
        x 90–118 y 24–34   (right ear)
  -->

  <!-- Charcoal left half -->
  <g clip-path="url(#cp-left)" fill="#1A1816">
    <!-- stem body -->
    <rect x="44" y="24" width="60" height="204"/>
    <!-- cap serifs top of stem -->
    <rect x="32" y="24" width="16" height="8" rx="2"/>
    <!-- stem bottom-left serif -->
    <rect x="28" y="224" width="24" height="8" rx="2"/>
  </g>

  <!-- Amber right half -->
  <g clip-path="url(#cp-right)" fill="#F5A623">
    <!-- stem body (right slice) -->
    <rect x="44" y="24" width="60" height="204"/>
    <!-- cap serif right ear -->
    <rect x="98" y="24" width="20" height="8" rx="2"/>
    <!-- stem bottom-right serif -->
    <rect x="100" y="224" width="24" height="8" rx="2"/>

    <!-- arch — approximated as a filled shape -->
    <!-- Arch is a thick curved band from (104,92) arcing to (154,108).
         We approximate with a trapezoid + rounded using a path. -->
    <path d="
      M 104,78
      C 120,66  140,68  154,84
      L 154,112
      C 140,96  120,94  104,106
      Z
    "/>

    <!-- right leg -->
    <rect x="154" y="84" width="60" height="144"/>
    <!-- right leg bottom-left serif -->
    <rect x="140" y="224" width="24" height="8" rx="2"/>
    <!-- right leg bottom-right serif -->
    <rect x="202" y="224" width="24" height="8" rx="2"/>
    <!-- right leg top-right serif (small) -->
    <rect x="202" y="84" width="18" height="8" rx="2"/>
  </g>

  <!-- Amber ✓ tick  —  upper-right quadrant, ~168–212 x, 36–78 y -->
  <polyline
    points="170,66  183,80  214,38"
    stroke="#F5A623"
    stroke-width="11"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
